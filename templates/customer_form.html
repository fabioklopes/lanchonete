{% extends 'base.html' %}

{% block content %}
<div class="container pt-4">

    <div class="d-flex justify-content-between align-items-center">
        <h3>Adicionar Cliente</h3>
        <a href="{% url 'customers' %}" class="btn btn-outline-secondary">Voltar para Clientes</a>
    </div>

    <div class="row mt-5 mb-5">
        <div class="col-md-6">
            <form method="post" action="">
                {% csrf_token %}

                <div class="input-group form-floating mb-3">
                    <span class="input-group-text"><i class="fa-solid fa-1"></i>º</span>
                    <div class="form-floating">
                        {{ form.first_name }}
                        <label for="floatingInputGroup1">Primeiro nome</label>
                    </div>
                </div>

                <div class="input-group form-floating mb-3">
                    <span class="input-group-text"><i class="fa-solid fa-2"></i>º</span>
                    <div class="form-floating">
                        {{ form.last_name }}
                        <label for="floatingInputGroup1">Restante do seu nome</label>
                    </div>
                </div>
                
                <div class="input-group form-floating mb-3">
                    <span class="input-group-text"><i class="fa-solid fa-at"></i></span>
                    <div class="form-floating">
                        {{ form.email }}
                        <label for="floatingInputGroup1">E-mail</label>
                    </div>
                </div>
                
                <div class="input-group form-floating mb-3">
                    <span class="input-group-text"><i class="fa-brands fa-square-whatsapp"></i></span>
                    <div class="form-floating">
                        {{ form.phone_number }}
                        <label for="floatingInputGroup1">WhatsApp</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-outline-success">Salvar</button>
            </form>
        </div>
    </div>


</div>
{% endblock %}
